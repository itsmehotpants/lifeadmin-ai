services:
  # ─── DATABASE ──────────────────────────────────────────────
  - type: pgo
    name: lifeadmin-db
    plan: free # Change to starter/standard for Production
    databaseName: lifeadmin
    user: lifeadmin_user

  # ─── REDIS QUEUE ───────────────────────────────────────────
  - type: redis
    name: lifeadmin-redis
    plan: free 
    ipAllowList: [] # Adjust for strict security

  # ─── BACKEND API ───────────────────────────────────────────
  - type: web
    name: lifeadmin-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lifeadmin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lifeadmin-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Must be set manually in Render Dashboard
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  # ─── FRONTEND WEB APP ──────────────────────────────────────
  - type: web
    name: lifeadmin-web
    env: docker
    dockerfilePath: ./apps/web/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lifeadmin-api
          envVarKey: RENDER_EXTERNAL_URL
